title: Suspicious File Deletion Activity
id: delete-001
description: Detects file deletion patterns associated with malware cleanup or evidence destruction
status: production
author: Solomon James

logsource:
  product: windows
  service: sysmon
  definition: Event ID 23 - File Delete Detected

detection:
  keywords:
    - 'TargetFilename contains .log'
    - 'TargetFilename contains .txt'
    - 'TargetFilename contains .exe'
    - 'TargetFilename contains Temp'
    - 'TargetFilename contains AppData'
  
  suspicious_process:
    - 'Image contains cmd.exe'
    - 'Image contains powershell.exe'
    - 'Image contains explorer.exe'
  
  filter:
    User|equals: 'SYSTEM'
  
  condition: keywords and suspicious_process and not filter

level: medium
tags:
  - attack.defense_evasion
  - attack.t1070
