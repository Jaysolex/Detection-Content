title: RDP / Network Brute Force Attack
id: 00000023-0000-0000-0000-000000000023
status: test
description: Detects repeated failed logon attempts (Event 4625) over network or RDP logon types, indicating brute force credential attacks
author: Solomon James
tags:
    - attack.t1110_001
    - attack.t1110_003
    - attack.t1021_001
logsource:
    product: windows
    service: security
detection:
    selection:
        EventID: 4625
        LogonType:
            - 3
            - 10
    timeframe: 5m
    condition: selection | count() by SourceNetworkAddress > 10
falsepositives:
    - Users repeatedly entering incorrect passwords
    - Service accounts with expired credentials
    - Misconfigured applications retrying authentication
level: high
