title: Process Injection Detection
id: inject-001
description: Detects process injection attempts via suspicious APIs or parent-child relationships
status: production
author: Solomon James

logsource:
  product: windows
  service: sysmon
  definition: Event ID 1 - Process Creation, Event ID 8 - CreateRemoteThread

detection:
  keywords:
    - 'CreateRemoteThread'
    - 'VirtualAllocEx'
    - 'WriteProcessMemory'
    - 'SetThreadContext'
  
  suspicious_parent:
    - 'ParentImage contains explorer.exe'
    - 'ParentImage contains svchost.exe'
    - 'ParentImage contains winlogon.exe'
  
  suspicious_child:
    - 'Image contains cmd.exe'
    - 'Image contains powershell.exe'
    - 'Image contains rundll32.exe'
  
  condition: keywords and suspicious_parent and suspicious_child

level: high
tags:
  - attack.defense_evasion
  - attack.t1055
